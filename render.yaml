services:
  - type: web
    name: caresyncr-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/v1/health
    healthCheckInterval: 30
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      
      # Frontend URL (update with your Netlify domain)
      - key: CLIENT_URL
        value: https://yourdomain.netlify.app
      - key: USE_IN_MEMORY_REDIS
        value: "true"
      
      # Database (add values in Render dashboard)
      - key: MONGODB_URI
        sync: false
      
      # JWT Secrets (add values in Render dashboard)
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      
      # SMTP Email Service
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      
      # Business Configuration
      - key: ANALYTICS_CACHE_TTL_SECONDS
        value: "600"
      
      # Logging
      - key: LOG_LEVEL
        value: info
