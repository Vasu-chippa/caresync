version: '3.9'
services:
  mongo-test:
    image: mongo:7
    ports:
      - '27018:27017'

  redis-test:
    image: redis:7-alpine
    ports:
      - '6380:6379'

  backend-test:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../backend:/app
    environment:
      RUN_INTEGRATION: 'true'
      NODE_ENV: test
      CLIENT_URL: http://localhost:5173
      MONGODB_URI: mongodb://mongo-test:27017/hms-integration
      REDIS_URL: redis://redis-test:6379
      JWT_ACCESS_SECRET: integration-access-secret-1234567890
      JWT_REFRESH_SECRET: integration-refresh-secret-1234567890
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      SMTP_HOST: smtp.test.local
      SMTP_PORT: 2525
      SMTP_USER: test
      SMTP_PASS: test
      SMTP_FROM: no-reply@test.com
    depends_on:
      - mongo-test
      - redis-test
    command: sh -c "npm ci ; npm run test:integration"
