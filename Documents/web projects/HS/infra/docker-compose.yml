version: '3.9'
services:
  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    env_file:
      - ../backend/.env.example
    ports:
      - '5000:5000'
    depends_on:
      - redis

  frontend:
    build:
      context: ..
      dockerfile: infra/docker/frontend.Dockerfile
    ports:
      - '8080:80'
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
