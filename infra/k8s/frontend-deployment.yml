apiVersion: apps/v1
kind: Deployment
metadata:
  name: hms-frontend
  namespace: hms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hms-frontend
  template:
    metadata:
      labels:
        app: hms-frontend
    spec:
      containers:
        - name: frontend
          image: hms/frontend:latest
          ports:
            - containerPort: 80
