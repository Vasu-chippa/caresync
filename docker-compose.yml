version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: caresyncr-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: caresyncr
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - caresyncr-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok'
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0-alpine
    container_name: caresyncr-redis
    command: redis-server --appendonly yes --requirepass redis123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - caresyncr-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: caresyncr-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/caresyncr?authSource=admin
      REDIS_URL: redis://:redis123@redis:6379
      JWT_SECRET: your-super-secret-jwt-key-min-32-chars-change-in-production
      JWT_EXPIRY: 24h
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: noreply@caresyncr.com
      DOCTOR_FEES_MULTIPLIER: 1.0
      PLATFORM_COMMISSION_RATE: 0.1
      NODE_ENV_LOG_LEVEL: info
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - caresyncr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: node:18-alpine
    container_name: caresyncr-frontend
    working_dir: /app/frontend
    command: npm run build && npm run preview
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: http://localhost:5000
      VITE_SOCKET_URL: http://localhost:5000
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "5173:5173"
    networks:
      - caresyncr-network
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
  mongodb_config:
  redis_data:

networks:
  caresyncr-network:
    driver: bridge
